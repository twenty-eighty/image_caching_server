services:
  - type: web
    name: image-caching-server
    runtime: elixir
    region: frankfurt
    plan: starter
    branch: main
    env: prod
    buildCommand: "./build.sh"
    startCommand: "mix phx.server"
    autoDeploy: true
    envVars:
      - key: MIX_ENV
        value: prod
      - key: PORT
        value: 80
      - key: CACHE_DIR
        value: /var/cache/images
      - key: MAX_CACHE_SIZE_MB
        value: 1024
      - key: ALLOWED_DOMAINS
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: PHX_HOST
        sync: false
    disk:
      name: cache
      mountPath: /var/cache/images
      sizeGB: 10 