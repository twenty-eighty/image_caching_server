services:
  - type: web
    name: image-caching-server
    runtime: elixir
    region: frankfurt
    plan: starter
    branch: main
    repo: https://github.com/twenty-eighty/image_caching_server
    env: prod
    buildCommand: "./build.sh"
    startCommand: "./_build/prod/rel/image_caching_server/bin/image_caching_server start"
    autoDeploy: true
    envVars:
      - key: MIX_ENV
        value: prod
      - key: PHX_SERVER
        value: "true"
      - key: PORT
        value: 80
      - key: CACHE_DIR
        value: /var/cache/images
      - key: MAX_CACHE_SIZE_MB
        value: 4096
      - key: ALLOWED_DOMAINS
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: PHX_HOST
        sync: false
    disk:
      name: cache
      mountPath: /var/cache/images
      sizeGB: 10
    # Ensure ImageMagick is available
    buildFilter:
      paths:
        - build.sh
        - mix.exs
        - mix.lock
        - lib/**/*
        - config/**/*
    scaling:
      minInstances: 1
      maxInstances: 1
    healthCheckPath: / 